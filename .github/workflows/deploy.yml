name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Connect to server and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 192.168.100.6
          username: francisco
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/francisco
            git pull
            docker compose down
            docker compose up -d --build
